
services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: ragent-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ragent
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - ragent-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ragent-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - ragent-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Milvus Standalone（包含内置的 etcd 和 MinIO）
  # etcd（Milvus 元数据存储）
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: ragent-etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - ragent-network
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO（Milvus 对象存储）
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: ragent-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9001:9001"  # MinIO Console
      - "9000:9000"  # MinIO API
    networks:
      - ragent-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Milvus 向量数据库（Standalone 模式）
  milvus:
    image: milvusdb/milvus:v2.3.4
    container_name: ragent-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"  # Milvus gRPC API
      - "9091:9091"     # Milvus Metrics
    environment:
      COMMON_STORAGETYPE: local
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - ragent-network
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 90s

  # Attu - Milvus 可视化工具
  attu:
    image: zilliz/attu:latest
    container_name: ragent-attu
    restart: unless-stopped
    ports:
      - "8000:3000"  # Attu Web UI
    environment:
      MILVUS_URL: milvus:19530
    networks:
      - ragent-network
    depends_on:
      milvus:
        condition: service_healthy

  # Go 应用
  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: ragent-app
  #   restart: unless-stopped
  #   ports:
  #     - "8080:8080"
  #   volumes:
  #     - ./configs:/app/configs:ro
  #     - ./logs:/app/logs
  #   environment:
  #     - GIN_MODE=release
  #     - CONFIG_PATH=/app/configs
  #     # 数据库配置（覆盖配置文件中的 localhost）
  #     - DATABASE_MYSQL_HOST=mysql
  #     - REDIS_HOST=redis
  #   depends_on:
  #     mysql:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - ragent-network

networks:
  ragent-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  milvus_data:
  etcd_data:
  minio_data:
