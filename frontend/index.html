<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>GoAgent 对话演示</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      color: #111827;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 12px 20px;
      background: #111827;
      color: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    header span {
      font-size: 12px;
      opacity: 0.8;
    }
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px 16px;
      gap: 8px;
      box-sizing: border-box;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      color: #4b5563;
    }
    .controls label {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .controls input {
      padding: 4px 6px;
      border-radius: 4px;
      border: 1px solid #d1d5db;
      font-size: 12px;
      min-width: 120px;
    }
    .chat-window {
      flex: 1;
      background: #ffffff;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      padding: 10px;
      overflow-y: auto;
      font-size: 14px;
    }
    .message {
      margin-bottom: 10px;
      max-width: 80%;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user {
      align-self: flex-end;
      background: #2563eb;
      color: #ffffff;
      border-radius: 14px 14px 2px 14px;
      padding: 8px 10px;
    }
    .message.assistant {
      align-self: flex-start;
      background: #f3f4f6;
      border-radius: 14px 14px 14px 2px;
      padding: 8px 10px;
    }
    .meta {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .contexts {
      margin-top: 6px;
      padding: 6px 8px;
      border-left: 2px solid #e5e7eb;
      background: #f9fafb;
      font-size: 12px;
      color: #4b5563;
    }
    .contexts-title {
      font-weight: 500;
      margin-bottom: 4px;
    }
    .input-bar {
      display: flex;
      gap: 8px;
      padding-top: 8px;
      border-top: 1px solid #e5e7eb;
    }
    .input-bar textarea {
      flex: 1;
      resize: none;
      height: 50px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      padding: 8px;
      font-size: 14px;
      font-family: inherit;
      box-sizing: border-box;
    }
    .input-bar button {
      padding: 0 14px;
      border-radius: 6px;
      border: none;
      background: #2563eb;
      color: #ffffff;
      font-size: 14px;
      cursor: pointer;
      min-width: 72px;
    }
    .input-bar button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .status {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <header>
    <h1>GoAgent RAG 多轮对话演示</h1>
    <span id="convLabel">会话：未开始</span>
  </header>
  <div class="container">
    <div class="controls">
      <label>
        知识库 ID:
        <input id="kbIdInput" placeholder="必填：kb_id" />
      </label>
      <label>
        TopK:
        <input id="topKInput" type="number" min="1" max="20" value="5" />
      </label>
      <span class="status" id="statusText"></span>
    </div>
    <div class="chat-window" id="chatWindow"></div>
    <div class="input-bar">
      <textarea id="questionInput" placeholder="输入你的问题，回车发送..."></textarea>
      <button id="sendBtn">发送</button>
    </div>
  </div>

  <script>
    const apiBase = "/api/v1/chat";

    const kbIdInput = document.getElementById("kbIdInput");
    const topKInput = document.getElementById("topKInput");
    const questionInput = document.getElementById("questionInput");
    const sendBtn = document.getElementById("sendBtn");
    const chatWindow = document.getElementById("chatWindow");
    const statusText = document.getElementById("statusText");
    const convLabel = document.getElementById("convLabel");

    let conversationId = "";

    function appendMessage(role, text, contexts) {
      const wrapper = document.createElement("div");
      wrapper.style.display = "flex";
      wrapper.style.flexDirection = "column";
      wrapper.style.alignItems = role === "user" ? "flex-end" : "flex-start";

      const msg = document.createElement("div");
      msg.className = "message " + role;
      msg.textContent = text;
      wrapper.appendChild(msg);

      if (role === "assistant" && contexts && contexts.length > 0) {
        const ctxDiv = document.createElement("div");
        ctxDiv.className = "contexts";
        const title = document.createElement("div");
        title.className = "contexts-title";
        title.textContent = "检索到的上下文片段：";
        ctxDiv.appendChild(title);

        contexts.forEach((c, idx) => {
          const p = document.createElement("div");
          p.textContent = `${idx + 1}. ${c}`;
          ctxDiv.appendChild(p);
        });

        wrapper.appendChild(ctxDiv);
      }

      chatWindow.appendChild(wrapper);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function sendQuestion() {
      const kbId = kbIdInput.value.trim();
      const question = questionInput.value.trim();
      const topK = parseInt(topKInput.value || "5", 10);

      if (!kbId) {
        alert("请先填写知识库 ID（kb_id）");
        return;
      }
      if (!question) {
        return;
      }

      appendMessage("user", question);
      questionInput.value = "";

      sendBtn.disabled = true;
      statusText.textContent = "发送中...";

      try {
        const payload = {
          question,
          kb_id: kbId,
          top_k: topK,
        };
        if (conversationId) {
          payload.conversation_id = conversationId;
        }

        const resp = await fetch(apiBase, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        if (!resp.ok) {
          const text = await resp.text();
          throw new Error(`HTTP ${resp.status}: ${text}`);
        }

        const data = await resp.json();
        conversationId = data.conversation_id || conversationId;
        if (conversationId) {
          convLabel.textContent = "会话：" + conversationId;
        }

        appendMessage("assistant", data.answer || "(空答案)", data.contexts || []);
        statusText.textContent = "";
      } catch (err) {
        console.error(err);
        statusText.textContent = "请求失败：" + err.message;
      } finally {
        sendBtn.disabled = false;
        questionInput.focus();
      }
    }

    sendBtn.addEventListener("click", sendQuestion);
    questionInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendQuestion();
      }
    });
  </script>
</body>
</html>
