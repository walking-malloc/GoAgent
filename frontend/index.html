<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>GoAgent 控制台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg: #0b1220;
        --panel: rgba(255, 255, 255, 0.06);
        --panel2: rgba(255, 255, 255, 0.08);
        --text: #e5e7eb;
        --muted: rgba(229, 231, 235, 0.7);
        --border: rgba(255, 255, 255, 0.12);
        --primary: #60a5fa;
        --primary2: #3b82f6;
        --danger: #fb7185;
        --ok: #34d399;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(1200px 800px at 10% 10%, rgba(96, 165, 250, 0.22), transparent 60%),
          radial-gradient(900px 700px at 90% 20%, rgba(52, 211, 153, 0.14), transparent 55%),
          radial-gradient(1000px 900px at 40% 100%, rgba(251, 113, 133, 0.12), transparent 50%),
          var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      header {
        position: sticky;
        top: 0;
        backdrop-filter: blur(12px);
        background: rgba(11, 18, 32, 0.7);
        border-bottom: 1px solid var(--border);
        z-index: 20;
      }

      .header-inner {
        max-width: 1100px;
        margin: 0 auto;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .brand-title {
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 0.2px;
      }

      .brand-sub {
        font-size: 12px;
        color: var(--muted);
      }

      .tabs {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .tab {
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        padding: 8px 10px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.15s ease;
      }
      .tab:hover {
        border-color: rgba(96, 165, 250, 0.5);
        color: var(--text);
      }
      .tab.active {
        background: rgba(96, 165, 250, 0.14);
        border-color: rgba(96, 165, 250, 0.55);
        color: var(--text);
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 16px;
        display: grid;
        gap: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: var(--shadow);
      }

      .panel-header {
        padding: 14px 14px 10px 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
      }

      .panel-title {
        font-size: 14px;
        font-weight: 700;
      }

      .panel-desc {
        font-size: 12px;
        color: var(--muted);
      }

      .panel-body {
        padding: 14px;
      }

      .grid {
        display: grid;
        gap: 12px;
      }

      .row {
        display: grid;
        grid-template-columns: 140px 1fr;
        gap: 10px;
        align-items: center;
      }

      label {
        font-size: 12px;
        color: var(--muted);
      }

      input,
      select,
      textarea {
        width: 100%;
        background: var(--panel2);
        border: 1px solid rgba(255, 255, 255, 0.14);
        color: var(--text);
        border-radius: 10px;
        padding: 10px 10px;
        box-sizing: border-box;
        outline: none;
        font-size: 13px;
      }

      textarea {
        min-height: 54px;
        resize: vertical;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: rgba(96, 165, 250, 0.7);
        box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.12);
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.15s ease;
      }

      button.primary {
        background: linear-gradient(180deg, rgba(59, 130, 246, 0.9), rgba(37, 99, 235, 0.9));
        border-color: rgba(59, 130, 246, 0.9);
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.5;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        color: var(--muted);
        background: rgba(255, 255, 255, 0.04);
      }

      .pill.ok {
        border-color: rgba(52, 211, 153, 0.4);
        color: rgba(52, 211, 153, 0.95);
        background: rgba(52, 211, 153, 0.08);
      }

      .pill.bad {
        border-color: rgba(251, 113, 133, 0.4);
        color: rgba(251, 113, 133, 0.95);
        background: rgba(251, 113, 133, 0.08);
      }

      .progress {
        height: 10px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.14);
      }
      .progress > div {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, rgba(96, 165, 250, 0.9), rgba(52, 211, 153, 0.9));
        transition: width 0.25s ease;
      }

      .chat-window {
        height: 56vh;
        overflow-y: auto;
        padding: 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.10);
      }

      .bubble {
        max-width: 80%;
        padding: 10px 12px;
        border-radius: 14px;
        margin: 8px 0;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .bubble.user {
        margin-left: auto;
        background: rgba(59, 130, 246, 0.26);
        border: 1px solid rgba(59, 130, 246, 0.35);
      }
      .bubble.assistant {
        margin-right: auto;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .ctx {
        margin-top: 8px;
        padding: 10px 10px;
        border-left: 3px solid rgba(96, 165, 250, 0.7);
        background: rgba(255, 255, 255, 0.04);
        border-radius: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 640px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <div class="brand">
          <div class="brand-title">GoAgent 控制台（/app/）</div>
          <div class="brand-sub">文档上传 + RAG 对话演示（纯静态页，无构建依赖）</div>
        </div>
        <div class="tabs">
          <button class="tab active" id="tabUpload" type="button">文档上传</button>
          <button class="tab" id="tabChat" type="button">对话</button>
        </div>
      </div>
    </header>

    <div class="container">
      <!-- Upload Panel -->
      <section class="panel" id="uploadPanel">
        <div class="panel-header">
          <div>
            <div class="panel-title">上传文档到知识库</div>
            <div class="panel-desc">接口：POST /api/v1/documents（multipart/form-data）</div>
          </div>
          <div class="pill" id="uploadStatusPill">未开始</div>
        </div>
        <div class="panel-body">
          <div class="grid">
            <div class="row">
              <label for="tokenInput">Token（可选）</label>
              <input id="tokenInput" placeholder="如需鉴权：粘贴登录后获得的 token（自动补 Bearer 前缀）" />
            </div>
            <div class="row">
              <label for="kbSelect">知识库（kb_id）</label>
              <div class="grid" style="grid-template-columns: 1fr auto; align-items: center;">
                <select id="kbSelect"></select>
                <button id="refreshKbBtn" type="button">刷新</button>
              </div>
            </div>
            <div class="row">
              <label for="fileInput">文件</label>
              <input id="fileInput" type="file" />
            </div>

            <div class="actions">
              <button class="primary" id="uploadBtn" type="button">开始上传</button>
              <button id="pollBtn" type="button" disabled>查看处理进度</button>
            </div>

            <div class="hint" id="uploadHint">
              - 如果接口提示“未提供认证Token/Token无效”，把登录接口返回的 <b>token</b> 粘贴到上面。<br />
              - 上传成功后会返回 doc_id，并可轮询 <code>/api/v1/documents/{id}/progress</code> 查看处理进度。
            </div>

            <div class="panel" style="box-shadow: none; background: rgba(255,255,255,0.03);">
              <div class="panel-body">
                <div class="grid" style="gap: 8px;">
                  <div class="hint"><b>Doc ID：</b><span id="docIdText" class="hint">-</span></div>
                  <div class="hint"><b>状态：</b><span id="docStatusText" class="hint">-</span></div>
                  <div class="progress"><div id="progressBar"></div></div>
                  <div class="hint" id="progressText">-</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Chat Panel -->
      <section class="panel hidden" id="chatPanel">
        <div class="panel-header">
          <div>
            <div class="panel-title">RAG 对话演示</div>
            <div class="panel-desc">接口：POST /api/v1/chat（JSON）</div>
          </div>
          <div class="pill" id="convPill">会话：未开始</div>
        </div>
        <div class="panel-body">
          <div class="grid">
            <div class="row">
              <label for="topKInput">TopK</label>
              <input id="topKInput" type="number" min="1" max="20" value="5" />
            </div>
            <div class="chat-window" id="chatWindow"></div>
            <div class="actions">
              <textarea id="questionInput" placeholder="输入问题，回车发送（Shift+Enter 换行）"></textarea>
              <button class="primary" id="sendBtn" type="button">发送</button>
            </div>
            <div class="hint" id="chatStatusText"></div>
          </div>
        </div>
      </section>
    </div>

    <script>
      const API_V1 = "/api/v1";

      // -------- helpers --------
      function getAuthHeader() {
        const raw = (document.getElementById("tokenInput").value || "").trim();
        if (!raw) return {};
        return { Authorization: raw.startsWith("Bearer ") ? raw : `Bearer ${raw}` };
      }

      async function apiFetch(path, options = {}) {
        const headers = Object.assign({}, options.headers || {}, getAuthHeader());
        const resp = await fetch(API_V1 + path, Object.assign({}, options, { headers }));
        const text = await resp.text();
        let json = null;
        try { json = text ? JSON.parse(text) : null; } catch { json = null; }

        if (!resp.ok) {
          throw new Error(`HTTP ${resp.status}: ${text}`);
        }
        if (json && typeof json === "object" && "code" in json) {
          const ok = json.code === 0 || json.code === "0";
          if (!ok) throw new Error(json.message || "请求失败");
          return json.data;
        }
        return json;
      }

      function setPill(el, text, type) {
        el.textContent = text;
        el.classList.remove("ok", "bad");
        if (type === "ok") el.classList.add("ok");
        if (type === "bad") el.classList.add("bad");
      }

      // -------- tabs --------
      const tabUpload = document.getElementById("tabUpload");
      const tabChat = document.getElementById("tabChat");
      const uploadPanel = document.getElementById("uploadPanel");
      const chatPanel = document.getElementById("chatPanel");

      function showUpload() {
        tabUpload.classList.add("active");
        tabChat.classList.remove("active");
        uploadPanel.classList.remove("hidden");
        chatPanel.classList.add("hidden");
      }

      function showChat() {
        tabChat.classList.add("active");
        tabUpload.classList.remove("active");
        chatPanel.classList.remove("hidden");
        uploadPanel.classList.add("hidden");
      }

      tabUpload.addEventListener("click", showUpload);
      tabChat.addEventListener("click", showChat);

      // -------- upload --------
      const kbSelect = document.getElementById("kbSelect");
      const refreshKbBtn = document.getElementById("refreshKbBtn");
      const fileInput = document.getElementById("fileInput");
      const uploadBtn = document.getElementById("uploadBtn");
      const pollBtn = document.getElementById("pollBtn");
      const uploadStatusPill = document.getElementById("uploadStatusPill");
      const docIdText = document.getElementById("docIdText");
      const docStatusText = document.getElementById("docStatusText");
      const progressBar = document.getElementById("progressBar");
      const progressText = document.getElementById("progressText");

      let currentDocId = "";
      let pollTimer = null;

      async function loadKnowledgeBases() {
        setPill(uploadStatusPill, "加载知识库中...", null);
        refreshKbBtn.disabled = true;
        try {
          const data = await apiFetch("/knowledge-base?page=1&page_size=200", { method: "GET" });
          const list = (data && data.list) ? data.list : [];

          kbSelect.innerHTML = "";
          if (!list.length) {
            const opt = document.createElement("option");
            opt.value = "";
            opt.textContent = "（无可用知识库）";
            kbSelect.appendChild(opt);
            setPill(uploadStatusPill, "未找到知识库", "bad");
            return;
          }

          list.forEach((kb) => {
            const opt = document.createElement("option");
            opt.value = kb.id;
            opt.textContent = `${kb.name} (${kb.id})`;
            kbSelect.appendChild(opt);
          });

          setPill(uploadStatusPill, "就绪", "ok");
        } catch (e) {
          console.error(e);
          setPill(uploadStatusPill, `加载失败：${e.message}`, "bad");
        } finally {
          refreshKbBtn.disabled = false;
        }
      }

      function stopPolling() {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
        pollBtn.disabled = !currentDocId;
      }

      async function fetchProgressOnce() {
        if (!currentDocId) return;
        const data = await apiFetch(`/documents/${currentDocId}/progress`, { method: "GET" });
        const status = (data && data.status) ? String(data.status) : "-";
        docStatusText.textContent = status;

        const chunkCount = typeof data?.chunk_count === "number" ? data.chunk_count : null;
        const processed = typeof data?.processed_chunks === "number" ? data.processed_chunks : null;

        if (chunkCount && processed !== null) {
          const pct = Math.max(0, Math.min(100, Math.round((processed / chunkCount) * 100)));
          progressBar.style.width = pct + "%";
          progressText.textContent = `已处理 ${processed}/${chunkCount}（${pct}%）`;
        } else {
          progressBar.style.width = "0%";
          progressText.textContent = data?.message ? String(data.message) : "处理中...";
        }

        const normalized = String(status).toLowerCase();
        if (normalized === "completed") {
          setPill(uploadStatusPill, "处理完成", "ok");
          stopPolling();
        } else if (normalized === "failed") {
          setPill(uploadStatusPill, "处理失败", "bad");
          stopPolling();
        } else {
          setPill(uploadStatusPill, `处理中：${status}`, null);
        }
      }

      async function startPolling() {
        if (!currentDocId) return;
        pollBtn.disabled = true;
        stopPolling();
        await fetchProgressOnce();
        pollTimer = setInterval(async () => {
          try {
            await fetchProgressOnce();
          } catch (e) {
            console.error(e);
            setPill(uploadStatusPill, `进度获取失败：${e.message}`, "bad");
            stopPolling();
          }
        }, 2000);
      }

      refreshKbBtn.addEventListener("click", loadKnowledgeBases);

      uploadBtn.addEventListener("click", async () => {
        const kbId = kbSelect.value;
        const file = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;
        if (!kbId) {
          setPill(uploadStatusPill, "请选择知识库", "bad");
          return;
        }
        if (!file) {
          setPill(uploadStatusPill, "请选择文件", "bad");
          return;
        }

        uploadBtn.disabled = true;
        pollBtn.disabled = true;
        setPill(uploadStatusPill, "上传中...", null);
        progressBar.style.width = "0%";
        progressText.textContent = "-";
        docStatusText.textContent = "-";
        docIdText.textContent = "-";
        currentDocId = "";
        stopPolling();

        try {
          const form = new FormData();
          form.append("kb_id", kbId);
          form.append("file", file);
          const doc = await apiFetch("/documents", {
            method: "POST",
            body: form
          });

          currentDocId = doc.id;
          docIdText.textContent = currentDocId;
          docStatusText.textContent = doc.status || "pending";
          setPill(uploadStatusPill, "上传成功，已开始处理", "ok");
          pollBtn.disabled = false;
        } catch (e) {
          console.error(e);
          setPill(uploadStatusPill, `上传失败：${e.message}`, "bad");
        } finally {
          uploadBtn.disabled = false;
        }
      });

      pollBtn.addEventListener("click", startPolling);

      // -------- chat --------
      const chatWindow = document.getElementById("chatWindow");
      const topKInput = document.getElementById("topKInput");
      const questionInput = document.getElementById("questionInput");
      const sendBtn = document.getElementById("sendBtn");
      const chatStatusText = document.getElementById("chatStatusText");
      const convPill = document.getElementById("convPill");
      let conversationId = "";

      function appendBubble(role, text, contexts) {
        const bubble = document.createElement("div");
        bubble.className = "bubble " + role;
        bubble.textContent = text;
        chatWindow.appendChild(bubble);

        if (role === "assistant" && contexts && contexts.length) {
          const ctx = document.createElement("div");
          ctx.className = "ctx";
          ctx.innerHTML = "<b>上下文片段：</b><br/>" + contexts.map((c, i) => `${i + 1}. ${escapeHtml(String(c))}`).join("<br/>");
          chatWindow.appendChild(ctx);
        }

        chatWindow.scrollTop = chatWindow.scrollHeight;
      }

      function escapeHtml(s) {
        return s
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      async function sendQuestion() {
        const question = (questionInput.value || "").trim();
        const topK = parseInt(topKInput.value || "5", 10);
        if (!question) return;

        appendBubble("user", question);
        questionInput.value = "";
        sendBtn.disabled = true;
        chatStatusText.textContent = "发送中...";

        try {
          const payload = { question, top_k: topK };
          if (conversationId) payload.conversation_id = conversationId;
          const data = await apiFetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          conversationId = data.conversation_id || conversationId;
          if (conversationId) setPill(convPill, "会话：" + conversationId, null);
          appendBubble("assistant", data.answer || "(空答案)", data.contexts || []);
          chatStatusText.textContent = "";
        } catch (e) {
          console.error(e);
          chatStatusText.textContent = "请求失败：" + e.message;
        } finally {
          sendBtn.disabled = false;
          questionInput.focus();
        }
      }

      sendBtn.addEventListener("click", sendQuestion);
      questionInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendQuestion();
        }
      });

      // init
      loadKnowledgeBases();
    </script>
  </body>
</html>
